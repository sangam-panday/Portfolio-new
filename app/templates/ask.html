

<!DOCTYPE html>
<html>
<head>
    <title>AI Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: #fff; color: #0d0d0d; height: 100vh; display: flex; flex-direction: column; }
        
        .chat-container { display: flex; flex-direction: column; height: 100vh; }
        
        header { background: #fff; border-bottom: 1px solid #d1d5db; padding: 16px; display: flex; justify-content: space-between; align-items: center; }
        header .logo { font-size: 20px; font-weight: 600; }
        header a { color: #0d0d0d; text-decoration: none; font-size: 14px; }
        header a:hover { color: #666; }
        
        .chat-history { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        
        .message { display: flex; gap: 12px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .message.user { justify-content: flex-end; }
        .message.user .content { background: #10a37f; color: white; border-radius: 12px; padding: 12px 16px; max-width: 70%; word-wrap: break-word; }
        
        .message.ai { justify-content: flex-start; }
        .message.ai .content { background: #f0f0f0; color: #0d0d0d; border-radius: 12px; padding: 12px 16px; max-width: 70%; word-wrap: break-word; line-height: 1.5; }
        
        .input-area { border-top: 1px solid #d1d5db; padding: 16px; background: #fff; }
        .input-wrapper { display: flex; gap: 10px; max-width: 900px; margin: 0 auto; width: 100%; }
        
        form { display: flex; gap: 10px; width: 100%; }
        input[type="text"] { flex: 1; padding: 12px 16px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; font-family: inherit; }
        input[type="text"]:focus { outline: none; border-color: #10a37f; box-shadow: 0 0 0 2px rgba(16, 163, 127, 0.1); }
        input[type="submit"] { padding: 12px 24px; background: #10a37f; color: white; border: none; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; transition: background 0.2s; }
        input[type="submit"]:hover { background: #0d8f6f; }
        input[type="submit"]:disabled { background: #d1d5db; cursor: not-allowed; }
        
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 20px; color: #999; }
        .empty-state svg { width: 60px; height: 60px; opacity: 0.3; }
    </style>
</head>
<body>
    <div class="chat-container">
        <header>
            <div class="logo">💬 AI Chat</div>
            <a href="{{ url_for('main.index') }}">← Home</a>
        </header>
        
        <div class="chat-history">
            {% if previous_chats or answer %}
                {% for chat in previous_chats %}
                    <div class="message user">
                        <div class="content">{{ chat.question }}</div>
                    </div>
                    <div class="message ai">
                        <div class="content">{{ chat.answer }}</div>
                    </div>
                {% endfor %}
            {% else %}
                <div class="empty-state">
                    <div style="font-size: 48px;">🤖</div>
                    <div>Ask me anything</div>
                </div>
            {% endif %}
        </div>
        
        <div class="input-area">
            <div class="input-wrapper">
                <form method="post" action="{{ url_for('main.ask') }}">
                    <input type="text" name="question" placeholder="Message AI..." required autofocus>
                    <input type="submit" value="Send">
                </form>
            </div>
        </div>
    </div>
    <script>
        // Auto-scroll to bottom
        const chatHistory = document.querySelector('.chat-history');
        if (chatHistory) {
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }
    </script>
</body>
    
    <footer>
        <p>&copy; 2026 AI Assistant. Made with ❤️</p>
    </footer>
</body>
</html>
