<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — AI Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0c0c0e;
            --surface: #141416;
            --surface-2: #1c1c20;
            --surface-3: #242428;
            --border: rgba(255,255,255,0.06);
            --border-md: rgba(255,255,255,0.11);
            --text: #eeedf2;
            --text-muted: #8c8b97;
            --text-faint: #4a4955;
            --accent: #e8a045;
            --accent-dim: rgba(232,160,69,0.12);
            --accent-glow: rgba(232,160,69,0.22);
            --font-display: 'Playfair Display', serif;
            --font-body: 'DM Sans', sans-serif;
            --font-mono: 'DM Mono', monospace;
            --radius: 14px;
        }
        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }
        .bg-glow {
            position: fixed; inset: 0; pointer-events: none;
            background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(232,160,69,0.06) 0%, transparent 65%);
        }
        .bg-grid {
            position: fixed; inset: 0; pointer-events: none;
            background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .card {
            position: relative; z-index: 1;
            width: 100%; max-width: 400px;
            background: var(--surface);
            border: 1px solid var(--border-md);
            border-radius: 20px;
            padding: 44px 40px;
            animation: rise 0.5s ease both;
        }
        @keyframes rise { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-faint); text-decoration: none; margin-bottom: 32px; transition: color 0.15s; font-family: var(--font-mono); }
        .back-link:hover { color: var(--text-muted); }

        .card-mark { width: 48px; height: 48px; border-radius: 14px; background: var(--accent-dim); border: 1px solid rgba(232,160,69,0.25); display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 20px; }
        .card-title { font-family: var(--font-display); font-size: 26px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; margin-bottom: 6px; }
        .card-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 32px; }

        .error-box {
            display: flex; align-items: flex-start; gap: 10px;
            background: rgba(232,85,85,0.1);
            border: 1px solid rgba(232,85,85,0.25);
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 20px;
            font-size: 13px; color: #f09090;
        }

        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 11px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; font-family: var(--font-mono); margin-bottom: 7px; }
        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%; padding: 11px 14px;
            background: var(--surface-2);
            border: 1px solid var(--border-md);
            border-radius: 10px;
            font-size: 14px; font-family: var(--font-body);
            color: var(--text);
            outline: none;
            transition: border-color 0.18s, box-shadow 0.18s;
        }
        input[type="email"]::placeholder,
        input[type="password"]::placeholder,
        input[type="text"]::placeholder { color: var(--text-faint); }
        input[type="email"]:focus,
        input[type="password"]:focus,
        input[type="text"]:focus {
            border-color: rgba(232,160,69,0.5);
            box-shadow: 0 0 0 3px rgba(232,160,69,0.1);
        }

        input[type="submit"] {
            width: 100%; margin-top: 8px;
            padding: 12px;
            background: var(--accent);
            color: #0c0c0e;
            border: none; border-radius: 10px;
            font-size: 14px; font-weight: 500; font-family: var(--font-body);
            cursor: pointer;
            transition: background 0.18s, transform 0.12s, box-shadow 0.18s;
            box-shadow: 0 4px 16px var(--accent-glow);
        }
        input[type="submit"]:hover { background: #f0aa55; transform: translateY(-1px); box-shadow: 0 6px 22px var(--accent-glow); }
        input[type="submit"]:active { transform: translateY(0); }

        .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
        .divider-line { flex: 1; height: 1px; background: var(--border); }
        .divider span { font-size: 11px; color: var(--text-faint); font-family: var(--font-mono); }

        .footer-link { text-align: center; font-size: 13px; color: var(--text-muted); }
        .footer-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-grid"></div>

    <div class="card">
        <a href="{{ url_for('main.index') }}" class="back-link">← Back to home</a>
        <div class="card-mark">🔑</div>
        <div class="card-title">Welcome back</div>
        <div class="card-sub">Sign in to your account to continue.</div>

        {% if error %}
            <div class="error-box">⚠ {{ error }}</div>
        {% endif %}

        <form method="post" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <input type="submit" value="Sign In →">
        </form>

        <div class="divider"><div class="divider-line"></div><span>or</span><div class="divider-line"></div></div>
        <p class="footer-link">No account? <a href="{{ url_for('auth.register') }}">Create one for free</a></p>
    </div>
</body>
</html>
