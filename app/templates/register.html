<!DOCTYPE html>
<html>
<head>
    <title>Register - AI Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #FFE5E5 0%, #FFF5F0 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { background: white; padding: 50px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); max-width: 400px; width: 100%; }
        .logo { text-align: center; font-size: 48px; margin-bottom: 20px; }
        h1 { text-align: center; color: #333; font-size: 28px; margin-bottom: 30px; font-weight: 700; }
        form { }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #FF6B6B; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        input[type="text"],
        input[type="password"] { width: 100%; padding: 12px 16px; border: 2px solid #f0f0f0; border-radius: 8px; font-size: 14px; transition: border-color 0.3s; }
        input[type="text"]:focus,
        input[type="password"]:focus { outline: none; border-color: #FF6B6B; }
        input[type="submit"] { width: 100%; padding: 12px; background: #FF6B6B; color: white; border: none; border-radius: 8px; font-weight: 600; font-size: 16px; cursor: pointer; transition: background 0.3s, transform 0.2s; margin-top: 10px; }
        input[type="submit"]:hover { background: #FF5252; transform: translateY(-2px); }
        .error { background: #FFE5E5; border-left: 4px solid #FF6B6B; color: #d32f2f; padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 14px; }
        .login { text-align: center; margin-top: 20px; color: #666; font-size: 14px; }
        .login a { color: #FF6B6B; text-decoration: none; font-weight: 600; }
        .login a:hover { text-decoration: underline; }
        .back { text-align: center; margin-bottom: 20px; }
        .back a { color: #666; text-decoration: none; font-size: 14px; }
        .back a:hover { color: #FF6B6B; }
    </style>
</head>
<body>
    <div class="container">
        <div class="back"><a href="{{ url_for('main.index') }}">← Back to Home</a></div>
        <div class="logo">✏️</div>
        <h1>Join Us</h1>
        
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        
        <form method="post" action="{{ url_for('auth.register') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a password" required>
            </div>
            
            <input type="submit" value="Create Account">
        </form>
        
        <p class="login">Already have an account? <a href="{{ url_for('auth.login') }}">Login here</a></p>
    </div>
</body>
</html>
